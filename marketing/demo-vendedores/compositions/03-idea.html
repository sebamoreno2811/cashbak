<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { width: 1920px; height: 1080px; overflow: hidden; font-family: "Inter", system-ui, sans-serif; color: #111827; }
      .stage {
        width: 1920px; height: 1080px; position: relative;
        background: linear-gradient(90deg, #f9fafb 0% 45%, #ffffff 45% 100%);
        display: flex; align-items: center; justify-content: center;
      }
      .row { display: flex; align-items: center; gap: 96px; padding: 0 120px; }
      /* Left side: product card + bet selector */
      .left { display: flex; flex-direction: column; gap: 24px; align-items: center; }
      .pcard {
        width: 460px; height: 580px; background: #fff;
        border: 1px solid #e5e7eb; border-radius: 18px; padding: 24px;
        display: flex; flex-direction: column; gap: 14px;
        box-shadow: 0 18px 48px rgba(17,24,39,0.10);
        position: relative;
      }
      .pcard .img {
        width: 100%; height: 320px; border-radius: 14px;
        background: #f9fafb;
        display: flex; align-items: center; justify-content: center;
        overflow: hidden;
      }
      .pcard .img img { max-width: 92%; max-height: 92%; object-fit: contain; }
      .pcard .name { font-size: 26px; font-weight: 700; color: #111827; margin-top: 6px; }
      .pcard .store { font-size: 16px; color: #6b7280; }
      .pcard .price { font-size: 32px; font-weight: 800; color: #111827; font-variant-numeric: tabular-nums; }
      .badge {
        position: absolute; top: 18px; right: 18px;
        background: #10b981; color: #fff;
        padding: 8px 16px; border-radius: 999px;
        font-weight: 800; font-size: 18px; letter-spacing: 0.02em;
        box-shadow: 0 4px 14px rgba(5,150,105,0.45);
      }
      .bets { width: 460px; display: flex; flex-direction: column; gap: 10px; }
      .bet {
        display: flex; align-items: center; gap: 18px;
        padding: 16px 20px; border: 1px solid #e5e7eb; border-radius: 14px;
        background: #fff; transition: none;
        color: #111827;
      }
      .bet.selected {
        background: #10b981; color: #fff; border-color: #10b981;
        box-shadow: 0 10px 24px rgba(5,150,105,0.35);
      }
      .bet .ico {
        flex: 0 0 44px;
        width: 44px; height: 44px; border-radius: 10px;
        background: rgba(16,185,129,0.12);
        display: flex; align-items: center; justify-content: center;
        color: #10b981;
      }
      .bet.selected .ico { background: rgba(255,255,255,0.18); color: #fff; }
      .bet .ico svg { width: 24px; height: 24px; flex-shrink: 0; }
      .bet .name {
        flex: 1 1 auto; min-width: 0;
        font-weight: 700; font-size: 18px;
        color: inherit;
      }
      .bet .pct {
        flex: 0 0 auto;
        font-weight: 800; font-size: 28px;
        color: inherit;
      }
      /* Right side: pivot text */
      .right {
        display: flex; flex-direction: column; gap: 20px;
        max-width: 720px;
      }
      .right .h1 {
        font-weight: 900; font-size: 76px;
        letter-spacing: -0.02em; line-height: 1.05;
        color: #111827;
      }
      .right .h2 {
        font-weight: 700; font-size: 40px;
        line-height: 1.15; color: #10b981;
      }
      .right .eyebrow {
        font-weight: 800; font-size: 16px; letter-spacing: 0.16em;
        text-transform: uppercase; color: #059669;
        display: flex; align-items: center; gap: 12px;
      }
      .right .eyebrow::after {
        content: ""; flex: 1; height: 2px; background: #d1fae5;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="idea" data-start="0" data-width="1920" data-height="1080">
      <div class="stage">
        <div class="row">
          <div class="left">
            <div class="pcard" id="ix-card">
              <div class="badge" id="ix-badge">CashBak hasta 100%</div>
              <div class="img"><img src="../assets/zapatillas-2.png" alt="Zapatillas" /></div>
              <div class="store">Deportes Andes</div>
              <div class="name">Zapatillas Running Pro</div>
              <div class="price">$39.990</div>
            </div>
            <div class="bets" id="ix-bets">
              <div class="bet" id="bet-1">
                <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg></span>
                <span class="name">Chile le gana a Brasil</span>
                <span class="pct">100%</span>
              </div>
              <div class="bet" id="bet-2">
                <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg></span>
                <span class="name">Francia gana el Mundial</span>
                <span class="pct">70%</span>
              </div>
              <div class="bet" id="bet-3">
                <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg></span>
                <span class="name">Bayern Munich gana la Champions League</span>
                <span class="pct">50%</span>
              </div>
            </div>
          </div>

          <div class="right">
            <div class="eyebrow" id="ix-eb">La idea CashBak</div>
            <div class="h1" id="ix-h1">El cliente elige un evento.</div>
            <div class="h2" id="ix-h2">Tú recibes tu ingreso siempre.</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Initial states — explicit, so the renderer always knows the baseline.
      gsap.set("#ix-card", { scale: 0.95, opacity: 0, transformOrigin: "50% 50%" });
      gsap.set("#ix-badge", { scale: 0, transformOrigin: "50% 50%" });
      gsap.set(["#bet-1", "#bet-2", "#bet-3"], { y: 20, opacity: 0 });
      gsap.set(["#ix-eb", "#ix-h1", "#ix-h2"], { y: 30, opacity: 0 });

      // Card + badge entrance
      tl.to("#ix-card", { scale: 1, opacity: 1, duration: 0.55, ease: "power2.out" }, 0);
      tl.to("#ix-badge", { scale: 1, duration: 0.45, ease: "back.out(1.6)" }, 0.4);
      tl.to("#ix-badge", { scale: 1.1, duration: 0.3, yoyo: true, repeat: 1, ease: "sine.inOut" }, 1.0);

      // 3 bet options enter staggered — all 3 stay visible & unselected for ~1.6s before selection
      tl.to("#bet-1", { y: 0, opacity: 1, duration: 0.4, ease: "power2.out" }, 0.9);
      tl.to("#bet-2", { y: 0, opacity: 1, duration: 0.4, ease: "power2.out" }, 1.1);
      tl.to("#bet-3", { y: 0, opacity: 1, duration: 0.4, ease: "power2.out" }, 1.3);

      // Right side text reveals while user reads the 3 options
      tl.to("#ix-eb", { y: 0, opacity: 1, duration: 0.45, ease: "power2.out" }, 1.2);
      tl.to("#ix-h1", { y: 0, opacity: 1, duration: 0.6, ease: "power3.out" }, 1.7);
      tl.to("#ix-h2", { y: 0, opacity: 1, duration: 0.6, ease: "power3.out" }, 2.5);

      // SELECTION HAPPENS LATER — viewer sees all 3 bets clearly first
      tl.add(() => {
        document.getElementById("bet-1").classList.add("selected");
      }, 3.3);
      tl.fromTo("#bet-1",
        { scale: 1 },
        { scale: 1.04, duration: 0.3, yoyo: true, repeat: 1, ease: "sine.inOut", transformOrigin: "50% 50%" }, 3.3
      );

      // FLUID EXIT — soft fade & slight lift in the last ~0.6s for a clean cut to Slide 4
      tl.to([".pcard", ".bets", ".right"],
        { y: -14, opacity: 0, duration: 0.55, ease: "power2.in" }, 5.4);

      window.__timelines["idea"] = tl;
    </script>
  </body>
</html>

<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { width: 1920px; height: 1080px; overflow: hidden; font-family: "Inter", system-ui, sans-serif; color: #111827; }
      .stage {
        width: 1920px; height: 1080px; position: relative;
        background: radial-gradient(circle at 50% 30%, #ffffff 0%, #f3f4f6 70%);
        display: flex; align-items: center; justify-content: center;
      }
      .pill {
        position: absolute; top: 48px; left: 48px;
        background: #10b981; color: #fff;
        padding: 14px 26px; border-radius: 999px;
        font-weight: 800; font-size: 22px;
        box-shadow: 0 12px 28px rgba(5,150,105,0.35);
        z-index: 10;
      }
      .pill .num { background: #fff; color: #10b981; padding: 2px 10px; border-radius: 999px; margin-right: 10px; }
      /* Browser frame */
      .browser {
        width: 1280px; height: 800px; background: #fff;
        border-radius: 18px; overflow: hidden;
        box-shadow: 0 30px 80px rgba(17,24,39,0.18), 0 0 0 1px #e5e7eb;
        position: relative;
      }
      .topbar {
        height: 56px; background: #f3f4f6; border-bottom: 1px solid #e5e7eb;
        display: flex; align-items: center; padding: 0 18px; gap: 16px;
      }
      .dots { display: flex; gap: 8px; }
      .dot { width: 14px; height: 14px; border-radius: 50%; }
      .dot.r { background: #ef4444; }
      .dot.y { background: #f59e0b; }
      .dot.g { background: #10b981; }
      .url {
        flex: 1; background: #fff; height: 32px; border-radius: 8px;
        border: 1px solid #e5e7eb;
        display: flex; align-items: center; padding: 0 14px;
        font-size: 14px; color: #374151;
      }
      .url .lock { color: #10b981; margin-right: 8px; font-weight: 700; }
      .content {
        padding: 48px 64px; display: flex; flex-direction: column; gap: 28px;
        height: calc(100% - 56px); position: relative;
      }
      .hero h1 {
        font-weight: 900; font-size: 48px; letter-spacing: -0.02em;
        color: #111827; margin-bottom: 8px;
      }
      .hero p { font-size: 20px; color: #6b7280; }
      .form {
        display: grid; grid-template-columns: 1fr 1fr; gap: 18px;
        margin-top: 8px;
      }
      .field { display: flex; flex-direction: column; gap: 8px; }
      .field label { font-weight: 600; font-size: 15px; color: #374151; }
      .field .input {
        height: 52px; background: #fff; border: 1px solid #e5e7eb;
        border-radius: 10px; padding: 0 16px;
        display: flex; align-items: center;
        font-size: 18px; color: #111827;
      }
      .caret {
        display: inline-block; width: 2px; height: 22px;
        background: #10b981; margin-left: 2px;
        animation: blink 0.8s steps(1) infinite;
        vertical-align: middle;
      }
      @keyframes blink { 50% { opacity: 0; } }
      .submit {
        align-self: flex-start; margin-top: 8px;
        background: #10b981; color: #fff;
        padding: 18px 36px; border-radius: 12px;
        font-weight: 800; font-size: 20px;
        box-shadow: 0 12px 28px rgba(5,150,105,0.35);
        position: relative;
      }
      .submit-pulse {
        position: absolute; inset: -8px; border-radius: 16px;
        border: 3px solid #10b981; opacity: 0;
      }
      .cursor {
        position: absolute;
        width: 28px; height: 28px;
        pointer-events: none; z-index: 5;
        filter: drop-shadow(0 4px 8px rgba(17,24,39,0.25));
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="paso1" data-start="0" data-width="1920" data-height="1080">
      <div class="stage">
        <div class="pill"><span class="num">1</span>de 3 — Postula tu tienda</div>

        <div class="browser" id="p1-browser">
          <div class="topbar">
            <div class="dots"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span></div>
            <div class="url"><span class="lock">●</span>cashbak.cl/sell/aplicar</div>
          </div>
          <div class="content">
            <div class="hero">
              <h1>Postula tu tienda en CashBak</h1>
              <p>Súmate al marketplace en pocos minutos.</p>
            </div>
            <div class="form">
              <div class="field">
                <label>Nombre de la tienda</label>
                <div class="input"><span id="f1"></span></div>
              </div>
              <div class="field">
                <label>RUT empresa</label>
                <div class="input"><span id="f2"></span></div>
              </div>
              <div class="field">
                <label>Categoría</label>
                <div class="input"><span id="f3"></span></div>
              </div>
              <div class="field">
                <label>Email de contacto</label>
                <div class="input"><span id="f4"></span></div>
              </div>
            </div>
            <div class="submit" id="p1-submit">
              Enviar solicitud
              <span class="submit-pulse" id="p1-pulse"></span>
            </div>
          </div>

          <svg class="cursor" id="p1-cursor" viewBox="0 0 24 24">
            <path d="M3 2l7 18 2-7 7-2L3 2z" fill="#111827" stroke="#fff" stroke-width="1.4"/>
          </svg>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // FAST PASS — 4s total. Cursor visits each field, types fast, lands on submit.
      tl.from("#p1-browser", { y: 30, scale: 0.97, opacity: 0, duration: 0.4, ease: "power2.out" }, 0);
      tl.from(".pill", { x: -30, opacity: 0, duration: 0.3, ease: "power2.out" }, 0.1);

      gsap.set("#p1-cursor", { x: 200, y: 240, opacity: 0 });
      tl.to("#p1-cursor", { opacity: 1, duration: 0.2 }, 0.4);

      // Field 1 — Nombre tienda
      tl.to("#p1-cursor", { x: 230, y: 260, duration: 0.3, ease: "power2.inOut" }, 0.55);
      tl.call(() => typeText("f1", "Deportes Andes", 0.2), null, 0.85);

      // Field 2 — RUT
      tl.to("#p1-cursor", { x: 760, y: 260, duration: 0.28, ease: "power2.inOut" }, 1.1);
      tl.call(() => typeText("f2", "76.123.456-7", 0.2), null, 1.35);

      // Field 3 — Categoría
      tl.to("#p1-cursor", { x: 230, y: 410, duration: 0.28, ease: "power2.inOut" }, 1.6);
      tl.call(() => typeText("f3", "Deportes", 0.15), null, 1.85);

      // Field 4 — Email
      tl.to("#p1-cursor", { x: 760, y: 410, duration: 0.28, ease: "power2.inOut" }, 2.05);
      tl.call(() => typeText("f4", "contacto@deportesandes.cl", 0.28), null, 2.3);

      // Submit click + pulse
      tl.to("#p1-cursor", { x: 240, y: 580, duration: 0.35, ease: "power2.inOut" }, 2.65);
      tl.to("#p1-submit", { scale: 1.05, duration: 0.18, yoyo: true, repeat: 1 }, 3.0);
      tl.fromTo("#p1-pulse",
        { opacity: 0.8, scale: 1 },
        { opacity: 0, scale: 1.25, duration: 0.85, ease: "power2.out" }, 3.0
      );

      function typeText(id, str, total) {
        const el = document.getElementById(id);
        if (!el) return;
        el.textContent = "";
        const caret = '<span class="caret"></span>';
        let i = 0;
        const dur = (typeof total === "number") ? total : 0.3;
        const step = (dur * 1000) / Math.max(str.length, 1);
        const tick = () => {
          if (i <= str.length) {
            el.innerHTML = str.slice(0, i) + caret;
            i++;
            setTimeout(tick, step);
          } else {
            el.innerHTML = str;
          }
        };
        tick();
      }

      window.__timelines["paso1"] = tl;
    </script>
  </body>
</html>

<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { width: 1920px; height: 1080px; overflow: hidden; font-family: "Inter", system-ui, sans-serif; color: #111827; }
      .stage {
        width: 1920px; height: 1080px; position: relative;
        background: linear-gradient(135deg, #14532d 0%, #166534 70%, #059669 140%);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 28px;
        color: #fff;
      }
      .stage::before {
        content: ""; position: absolute; top: -200px; right: -200px;
        width: 900px; height: 900px;
        background: radial-gradient(circle, rgba(16,185,129,0.30), transparent 60%);
      }
      .stage::after {
        content: ""; position: absolute; bottom: -180px; left: -180px;
        width: 700px; height: 700px;
        background: radial-gradient(circle, rgba(255,255,255,0.06), transparent 65%);
      }
      .logo {
        width: 110px; height: 110px;
        background: #fff; border-radius: 26px;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 14px 40px rgba(5,150,105,0.45);
        position: relative; z-index: 2;
      }
      .logo img { width: 78px; height: 78px; object-fit: contain; }
      .wordmark {
        font-weight: 800; font-size: 56px; letter-spacing: -0.02em;
        color: #fff; position: relative; z-index: 2;
      }
      .wordmark .accent { color: #a7f3d0; }

      .h1 {
        font-weight: 900; font-size: 84px; letter-spacing: -0.02em;
        line-height: 1.05; text-align: center;
        position: relative; z-index: 2;
      }

      .cta {
        margin-top: 20px;
        background: #fff; color: #047857;
        padding: 26px 56px; border-radius: 16px;
        font-weight: 900; font-size: 36px;
        box-shadow: 0 16px 40px rgba(0,0,0,0.30);
        position: relative; z-index: 2;
      }
      .cta .arrow { color: #10b981; margin-left: 12px; }

      .ctaPulse {
        position: absolute; inset: -10px;
        border-radius: 22px;
        border: 4px solid rgba(255,255,255,0.6);
        opacity: 0; pointer-events: none;
      }

      .sub {
        font-weight: 500; font-size: 26px; color: #a7f3d0;
        position: relative; z-index: 2;
        letter-spacing: -0.005em;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="cierre" data-start="0" data-width="1920" data-height="1080">
      <div class="stage">
        <div class="logo" id="cl-logo">
          <img src="../assets/logo.png" alt="CashBak" />
        </div>
        <div class="wordmark" id="cl-wordmark">Cash<span class="accent">Bak</span></div>
        <h1 class="h1" id="cl-h1">Abre tu tienda hoy.</h1>

        <div class="cta" id="cl-cta">
          cashbak.cl/sell <span class="arrow">→</span>
          <span class="ctaPulse" id="cl-pulse"></span>
        </div>

        <div class="sub" id="cl-sub">Sin costos fijos · Soporte con Baki</div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.from("#cl-logo", { scale: 0.85, opacity: 0, duration: 0.5, ease: "power2.out" }, 0);
      tl.from("#cl-wordmark", { y: 20, opacity: 0, duration: 0.45, ease: "power2.out" }, 0.2);
      tl.from("#cl-h1", { y: 30, opacity: 0, duration: 0.55, ease: "power3.out" }, 0.5);
      tl.from("#cl-cta", { y: 30, opacity: 0, scale: 0.95, duration: 0.6, ease: "back.out(1.4)" }, 0.95);
      tl.from("#cl-sub", { y: 16, opacity: 0, duration: 0.4, ease: "power2.out" }, 1.45);

      // pulse the CTA
      tl.fromTo("#cl-pulse",
        { opacity: 0.8, scale: 1 },
        { opacity: 0, scale: 1.18, duration: 1.2, ease: "power2.out", repeat: 2 }, 1.6);

      window.__timelines["cierre"] = tl;
    </script>
  </body>
</html>

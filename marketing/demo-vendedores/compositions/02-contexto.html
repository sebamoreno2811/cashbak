<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { width: 1920px; height: 1080px; overflow: hidden; font-family: "Inter", system-ui, sans-serif; color: #111827; }
      .stage {
        width: 1920px; height: 1080px; position: relative;
        background: radial-gradient(circle at 50% 40%, #ffffff 0%, #f3f4f6 80%);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        padding: 0 96px;
      }
      .grid { display: flex; gap: 48px; margin-bottom: 80px; }
      .pcard {
        width: 380px; height: 480px; background: #fff; border: 1px solid #e5e7eb;
        border-radius: 16px; padding: 24px;
        display: flex; flex-direction: column; gap: 16px;
        box-shadow: 0 6px 24px rgba(17,24,39,0.06);
      }
      .pcard .img {
        width: 100%; height: 260px; border-radius: 12px;
        background: #f9fafb; display: flex; align-items: center; justify-content: center;
        overflow: hidden;
      }
      .pcard .img img {
        max-width: 92%; max-height: 92%; object-fit: contain;
      }
      .pcard .name { font-weight: 700; font-size: 22px; color: #111827; }
      .pcard .store { font-size: 16px; color: #6b7280; }
      .pcard .price {
        margin-top: auto; font-weight: 800; font-size: 32px;
        font-variant-numeric: tabular-nums; color: #111827;
      }
      .pointer {
        position: absolute;
        width: 56px; height: 56px;
        top: 0; left: 0;
        pointer-events: none;
        filter: drop-shadow(0 6px 14px rgba(17,24,39,0.35));
      }
      .pointer svg { width: 100%; height: 100%; }
      .ripple {
        position: absolute; top: 0; left: 0;
        width: 18px; height: 18px; border-radius: 50%;
        border: 3px solid #10b981; opacity: 0;
        pointer-events: none;
      }
      .caption {
        position: relative;
        font-weight: 800; font-size: 56px;
        color: #111827; letter-spacing: -0.02em;
        text-align: center;
        padding: 18px 32px;
      }
      .caption .accent {
        color: #047857;
        position: relative;
        display: inline-block;
      }
      .caption .underline {
        position: absolute; left: 0; right: 0; bottom: -6px; height: 8px;
        background: linear-gradient(90deg, #a7f3d0 0%, #10b981 100%);
        border-radius: 999px;
        transform-origin: left center;
        transform: scaleX(0);
      }
      .caption .eyebrow {
        display: block;
        font-weight: 700; font-size: 18px; letter-spacing: 0.18em;
        color: #047857; text-transform: uppercase;
        margin-bottom: 14px;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="contexto" data-start="0" data-width="1920" data-height="1080">
      <div class="stage" id="ctx-stage">
        <div class="grid" id="ctx-grid">
          <div class="pcard" id="card-a">
            <div class="img"><img src="../assets/audifonos-1.webp" alt="Audífonos" /></div>
            <div class="name">Audífonos Inalámbricos</div>
            <div class="store">Tienda A</div>
            <div class="price">$24.990</div>
          </div>
          <div class="pcard" id="card-b">
            <div class="img"><img src="../assets/zapatillas-2.png" alt="Zapatillas Running" /></div>
            <div class="name">Zapatillas Running Pro</div>
            <div class="store">Tienda B</div>
            <div class="price">$39.990</div>
          </div>
          <div class="pcard" id="card-c">
            <div class="img"><img src="../assets/reloj-3.png" alt="Reloj Deportivo" /></div>
            <div class="name">Reloj Deportivo GPS</div>
            <div class="store">Tienda C</div>
            <div class="price">$74.990</div>
          </div>
        </div>

        <div class="pointer" id="pointer">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 3L5 19L9.5 14.5L12.5 21L15.5 19.5L12.5 13.5L19 13.5L5 3Z"
                  fill="#ffffff" stroke="#111827" stroke-width="1.4" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="ripple" id="ripple"></span>

        <p class="caption" id="ctx-caption">
          <span class="eyebrow">El reto</span>
          Llamar la atención <span class="accent">cuesta caro<span class="underline" id="ctx-underline"></span></span>.
        </p>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // cards entrance
      tl.from("#card-a", { y: 40, opacity: 0, duration: 0.5, ease: "power2.out" }, 0);
      tl.from("#card-b", { y: 40, opacity: 0, duration: 0.5, ease: "power2.out" }, 0.15);
      tl.from("#card-c", { y: 40, opacity: 0, duration: 0.5, ease: "power2.out" }, 0.3);

      // Pointer hovers card centers. Stage 1920×1080, padding 0 96, cards 380w with 48 gap centered.
      // Card centers (x): 532, 960, 1388. Card vertical center: ~470 (top of grid + half height).
      // SVG pointer tip is at top-left ~(5,3) of 24px box → at width 56, tip ≈ (12, 7).
      // To make tip rest on card center, place pointer at (cx-12, cy-7).
      const A = { x: 520, y: 463 };
      const B = { x: 948, y: 463 };
      const C = { x: 1376, y: 463 };

      gsap.set("#pointer", { x: A.x - 100, y: A.y + 80, opacity: 0 });
      gsap.set("#ripple", { x: 0, y: 0, opacity: 0, scale: 0.8 });

      // pointer fades in entering toward card A
      tl.to("#pointer", { opacity: 1, duration: 0.3 }, 0.7);
      tl.to("#pointer", { x: A.x, y: A.y, duration: 0.6, ease: "power2.out" }, 0.7);

      // hover/click on A
      tl.add(() => {
        gsap.set("#ripple", { x: A.x + 12, y: A.y + 7 });
      }, 1.3);
      tl.fromTo("#ripple",
        { opacity: 0.9, scale: 0.6 },
        { opacity: 0, scale: 2.4, duration: 0.6, ease: "power2.out" }, 1.3);
      tl.to("#card-a", { y: -8, duration: 0.2, yoyo: true, repeat: 1, ease: "sine.inOut" }, 1.3);

      // glide to B
      tl.to("#pointer", { x: B.x, y: B.y, duration: 0.7, ease: "power2.inOut" }, 1.7);
      tl.add(() => {
        gsap.set("#ripple", { x: B.x + 12, y: B.y + 7 });
      }, 2.4);
      tl.fromTo("#ripple",
        { opacity: 0.9, scale: 0.6 },
        { opacity: 0, scale: 2.4, duration: 0.6, ease: "power2.out" }, 2.4);
      tl.to("#card-b", { y: -8, duration: 0.2, yoyo: true, repeat: 1, ease: "sine.inOut" }, 2.4);

      // glide to C
      tl.to("#pointer", { x: C.x, y: C.y, duration: 0.7, ease: "power2.inOut" }, 2.8);
      tl.add(() => {
        gsap.set("#ripple", { x: C.x + 12, y: C.y + 7 });
      }, 3.5);
      tl.fromTo("#ripple",
        { opacity: 0.9, scale: 0.6 },
        { opacity: 0, scale: 2.4, duration: 0.6, ease: "power2.out" }, 3.5);
      tl.to("#card-c", { y: -8, duration: 0.2, yoyo: true, repeat: 1, ease: "sine.inOut" }, 3.5);

      // caption appears earlier (3.2s) with eyebrow + animated underline
      tl.from("#ctx-caption", { y: 30, opacity: 0, duration: 0.6, ease: "power3.out" }, 3.2);
      tl.to("#ctx-underline", { scaleX: 1, duration: 0.7, ease: "power2.out" }, 3.7);

      // pointer drifts off screen at the end so it doesn't sit on top of card C
      tl.to("#pointer", { x: C.x + 240, y: C.y + 320, opacity: 0, duration: 0.8, ease: "power2.in" }, 4.2);

      // ambient dolly
      tl.fromTo("#ctx-grid", { scale: 1.04 }, { scale: 1, duration: 6, ease: "power1.out" }, 0);

      window.__timelines["contexto"] = tl;
    </script>
  </body>
</html>

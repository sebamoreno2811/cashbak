<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
  <defs>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="0" dy="3" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ctaShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- FONDO -->
  <rect width="1080" height="1350" fill="#F7F3E8"/>

  <!-- HEADER LOGO -->
  <g transform="translate(80, 70)">
    <rect x="0" y="0" width="80" height="80" rx="16" fill="#0C5C2E"/>
    <text x="32" y="56" font-family="Arial Black, Helvetica, sans-serif" font-size="48" font-weight="900" text-anchor="middle" fill="#FFF8E8">$</text>
    <g transform="translate(50, 46)">
      <circle cx="14" cy="14" r="14" fill="#FFF8E8"/>
      <polygon points="14,4 21,9 19,17 9,17 7,9" fill="#0C5C2E"/>
    </g>
    <text x="100" y="58" font-family="Arial Black, Helvetica, sans-serif" font-size="44" font-weight="900" fill="#111">CASHBAK</text>
  </g>

  <!-- TÍTULO -->
  <text x="540" y="220" font-family="Arial Black, sans-serif" font-size="56" font-weight="900" text-anchor="middle" fill="#111">EXPLORA</text>
  <text x="540" y="285" font-family="Arial Black, sans-serif" font-size="56" font-weight="900" text-anchor="middle" fill="#0C5C2E">TODAS LAS TIENDAS</text>
  <line x1="345" y1="305" x2="735" y2="305" stroke="#0C5C2E" stroke-width="5" stroke-linecap="round"/>

  <!-- Subtítulo -->
  <text x="540" y="355" font-family="Arial, sans-serif" font-size="24" font-weight="600" text-anchor="middle" fill="#6B7A6E">Desde moda hasta tecnología — con CashBak en cada compra</text>

  <!-- ===== GRID DE CATEGORÍAS 3x2 ===== -->
  <!-- Card 1: MODA -->
  <g filter="url(#cardShadow)">
    <rect x="70" y="410" width="300" height="220" rx="22" fill="#FFFFFF" stroke="#E8E2D2" stroke-width="2"/>
  </g>
  <!-- Icono percha/polera -->
  <g transform="translate(170, 445)">
    <!-- Polera -->
    <path d="M 20 35 L 35 20 L 55 20 L 55 15 Q 55 5 65 5 L 75 5 Q 85 5 85 15 L 85 20 L 105 20 L 120 35 L 110 55 L 100 50 L 100 95 L 40 95 L 40 50 L 30 55 Z"
          fill="#0C5C2E" stroke="#0A4A24" stroke-width="2" stroke-linejoin="round"/>
  </g>
  <text x="220" y="590" font-family="Arial Black, sans-serif" font-size="24" font-weight="900" text-anchor="middle" fill="#111">MODA</text>

  <!-- Card 2: TECNOLOGÍA -->
  <g filter="url(#cardShadow)">
    <rect x="390" y="410" width="300" height="220" rx="22" fill="#FFFFFF" stroke="#E8E2D2" stroke-width="2"/>
  </g>
  <g transform="translate(490, 445)">
    <!-- Laptop -->
    <rect x="10" y="15" width="100" height="65" rx="4" fill="#0C5C2E" stroke="#0A4A24" stroke-width="2"/>
    <rect x="18" y="22" width="84" height="50" rx="2" fill="#10B981"/>
    <path d="M 0 85 L 120 85 L 110 95 L 10 95 Z" fill="#0C5C2E" stroke="#0A4A24" stroke-width="2" stroke-linejoin="round"/>
    <!-- Pantalla brillo -->
    <path d="M 22 25 L 30 25 L 25 65 L 22 65 Z" fill="#FFFFFF" opacity="0.3"/>
  </g>
  <text x="540" y="590" font-family="Arial Black, sans-serif" font-size="24" font-weight="900" text-anchor="middle" fill="#111">TECNOLOGÍA</text>

  <!-- Card 3: HOGAR -->
  <g filter="url(#cardShadow)">
    <rect x="710" y="410" width="300" height="220" rx="22" fill="#FFFFFF" stroke="#E8E2D2" stroke-width="2"/>
  </g>
  <g transform="translate(810, 450)">
    <!-- Casa -->
    <path d="M 60 5 L 110 45 L 110 95 L 10 95 L 10 45 Z" fill="#0C5C2E" stroke="#0A4A24" stroke-width="2" stroke-linejoin="round"/>
    <rect x="45" y="55" width="30" height="40" fill="#F5B800"/>
    <rect x="20" y="55" width="18" height="18" fill="#FFF8E8"/>
    <rect x="82" y="55" width="18" height="18" fill="#FFF8E8"/>
    <!-- Chimenea -->
    <rect x="85" y="18" width="12" height="20" fill="#0A4A24"/>
  </g>
  <text x="860" y="590" font-family="Arial Black, sans-serif" font-size="24" font-weight="900" text-anchor="middle" fill="#111">HOGAR</text>

  <!-- Card 4: DEPORTES -->
  <g filter="url(#cardShadow)">
    <rect x="70" y="655" width="300" height="220" rx="22" fill="#FFFFFF" stroke="#E8E2D2" stroke-width="2"/>
  </g>
  <g transform="translate(170, 690)">
    <!-- Pelota de fútbol -->
    <circle cx="60" cy="50" r="50" fill="#FFFFFF" stroke="#0C5C2E" stroke-width="3"/>
    <polygon points="60,20 78,33 72,54 48,54 42,33" fill="#0C5C2E"/>
    <polygon points="60,20 68,5 52,5" fill="#0C5C2E" opacity="0.7"/>
    <polygon points="42,33 25,30 20,48 35,55" fill="#0C5C2E" opacity="0.7"/>
    <polygon points="78,33 95,30 100,48 85,55" fill="#0C5C2E" opacity="0.7"/>
    <polygon points="48,54 42,75 58,80" fill="#0C5C2E" opacity="0.7"/>
    <polygon points="72,54 78,75 62,80" fill="#0C5C2E" opacity="0.7"/>
  </g>
  <text x="220" y="835" font-family="Arial Black, sans-serif" font-size="24" font-weight="900" text-anchor="middle" fill="#111">DEPORTES</text>

  <!-- Card 5: BELLEZA -->
  <g filter="url(#cardShadow)">
    <rect x="390" y="655" width="300" height="220" rx="22" fill="#FFFFFF" stroke="#E8E2D2" stroke-width="2"/>
  </g>
  <g transform="translate(510, 685)">
    <!-- Labial -->
    <rect x="25" y="40" width="50" height="60" rx="3" fill="#0C5C2E" stroke="#0A4A24" stroke-width="2"/>
    <rect x="20" y="32" width="60" height="12" rx="3" fill="#F5B800" stroke="#0A4A24" stroke-width="2"/>
    <!-- Pigmento -->
    <path d="M 35 10 L 55 10 L 65 30 L 25 30 Z" fill="#EF4135" stroke="#0A4A24" stroke-width="2"/>
    <path d="M 35 10 L 55 10 L 45 0 Z" fill="#EF4135" stroke="#0A4A24" stroke-width="2"/>
  </g>
  <text x="540" y="835" font-family="Arial Black, sans-serif" font-size="24" font-weight="900" text-anchor="middle" fill="#111">BELLEZA</text>

  <!-- Card 6: Y MUCHO MÁS -->
  <g filter="url(#cardShadow)">
    <rect x="710" y="655" width="300" height="220" rx="22" fill="#0C5C2E"/>
  </g>
  <!-- Tres puntitos grandes -->
  <g transform="translate(810, 720)">
    <circle cx="20" cy="40" r="12" fill="#F5B800"/>
    <circle cx="60" cy="40" r="12" fill="#F5B800"/>
    <circle cx="100" cy="40" r="12" fill="#F5B800"/>
  </g>
  <text x="860" y="820" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" text-anchor="middle" fill="#FFF8E8">Y MUCHO</text>
  <text x="860" y="850" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" text-anchor="middle" fill="#F5B800">MÁS</text>

  <!-- ===== MENSAJE + CTA ===== -->
  <text x="540" y="955" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" text-anchor="middle" fill="#111">Compra lo que quieras.</text>
  <text x="540" y="1000" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" text-anchor="middle" fill="#0C5C2E">Recupera tu dinero.</text>

  <!-- Botón CTA -->
  <g filter="url(#ctaShadow)">
    <rect x="150" y="1055" width="780" height="110" rx="55" fill="#0C5C2E"/>
  </g>
  <text x="540" y="1100" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" text-anchor="middle" fill="#FFF8E8">EXPLORA EN</text>
  <text x="540" y="1145" font-family="Arial Black, sans-serif" font-size="38" font-weight="900" text-anchor="middle" fill="#F5B800">CASHBAK.CL →</text>

  <!-- Pill: envío -->
  <g transform="translate(290, 1200)">
    <rect x="0" y="0" width="500" height="50" rx="25" fill="#FFFFFF" stroke="#0C5C2E" stroke-width="2"/>
    <text x="250" y="33" font-family="Arial Black, sans-serif" font-size="18" font-weight="900" text-anchor="middle" fill="#0C5C2E">★ ENVÍO A TODO CHILE ★</text>
  </g>

  <!-- FOOTER -->
  <rect x="0" y="1300" width="1080" height="50" fill="#0C5C2E"/>
  <text x="540" y="1333" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" text-anchor="middle" fill="#FFF8E8">@CASHBAK.CL</text>

</svg>
